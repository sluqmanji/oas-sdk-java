    # Reusable schema definitions
    id:
      title: id
      description: ID of the object
      type: string
    name:
      title: name
      description: Name of the object
      type: string
      maxLength: 255
    description:
      title: description
      description: Description of the object
      type: string
      maxLength: 255
    departmentView: 
      $ref: "./DepartmentView.yaml"
    lastModified:
      title: lastModified
      description: Date and time when object was last modified
      format: date-time
      type: string
    lastModifiedBy: 
      $ref: "./UserView.yaml#/components/schemas/UserView"
    emailAddress:
      title: emailAddress
      description: Email address of the object
      format: email
      type: string
      maxLength: 255 
    Errors:
      type: "object"
      title: "Errors"
      properties:
        error:
          title: "error"
          type: "array"
          items:
            $ref: "#/components/schemas/Error"
          minItems: 0
    Error:
      type: "object"
      title: "Error"
      properties:
        sourceObject: 
          $ref: "#/components/schemas/SourceObject"
        code:
          title: "code"
          type: "string"
        message:
          title: "message"
          type: "string"
    Provider:
      type: object
      title: Provider
      properties:
        provider1:
          type: object
          properties:
            idp:
              type: object
              properties:
                idpLoginURL:
                  type: string
                idpLogoutURL:
                  type: string
                samelRequest:
                  type: string
            default:
              type: boolean
            id:
              type: string
    ErrorKnowledge:
      type: "object"
      title: "Error Knowledge"
      required:
        - "message"
      properties:
        message:
          title: "message"
          type: "string"
    WSErrorCommon:
      type: "object"
      title: "Error Response"
      required:
        - "code"
        - "developerMessage"
      properties:
        code:
          title: "Code Identifier"
          description: |
            A string that follows the pattern *{integer}-{integer}*.

            The first *{integer}* is the http status code.  This code as a whole is unique.
            * For example, error codes "400-101" and "404-101" are distinctly different.
          type: "string"
        developerMessage:
          title: "Developer Message"
          description: A summary of the error.
          type: "string"
          minLength: 0
          maxLength: 2048
        details:
          title: "Response Details"
          type: "array"
          items:
            type: "object"
            required:
              - "key"
            properties:
              key:
                title: "Key"
                type: "string"
                minLength: 0
                maxLength: 255
              value:
                title: "Value"
                type: "string"
                minLength: 0
                maxLength: 255
          minItems: 0
          maxItems: 30
        userMessage:
          title: "User Message"
          description: |
            UI friendly messages are only supported by some APIs.  
              * The client must explicitly request UI friendly messages by passing the *X-egain-error-message=yes* header.
          type: "string"
          minLength: 0
          maxLength: 1024
    WSErrorLegacy:
      type: "object"
      title: "Error Response"
      required:
        - "message"
      properties:
        message:
          title: "Developer Message"
          description: A summary of the error.
          type: "string"
  examples:
    # 400
    UnsupportedParameters:
      value:
        code: 400-101
        developerMessage: 'Unsupported query parameter(s) supplied: ''<query_parameter>''.'
    InvalidValueQueryParameter:
      value:
        code: 400-244
        developerMessage: 'Invalid value provided for query parameter: ''<query_parameter>''.'
    InvalidValueMacro:
      value:
        code: 400-249
        developerMessage: 'Following macros could not be expanded as they do not exist: ''<macro_name>''.'
    EmptyMacro:
      value:
        code: 400-248
        developerMessage: 'Empty macro provided in the request body.'
    MacroExpansionFailed:
      value:
        code: 400-247
        developerMessage: 'Following macros could not be expanded: ''<macro_name>''.'
    InvalidValue:
      value:
        code: 400-152
        developerMessage: 'Invalid value is provided in the request body for the following attribute:''<attribute_name>''.'
    InvalidValueForAttribute:
      value:
        code: 400-116
        developerMessage: 'Unsupported value for $attribute query parameter: ''<$attribute_value>''. Only the following attributes are supported: ''<supported_attribute_list>''.'
    MissingParameter:
      value:
        code: 400-112
        developerMessage: 'Required query parameter(s) is missing. The following parameters are required: ''<query_parameter>''.'
    MaxIDsExceeded:
      value:
        code: TBD Max IDs Exceeded
        developerMessage: TBD Max IDs Exceeded
    MaxIDs:
      value:
        code: 400-TBD
        developerMessage: TBD More than 75 IDs are supplied in request URL
    UnallowedCombination:
      value:
        code: '400-120'
        developerMessage: 'Unsupported combination of query parameters: pagination and range query parameters cannot be mixed in the same request.'
    InvalidQueryParamValue:
      value:
        code: '400-102'
        developerMessage: 'Unsupported value for query parameter ''<query_parameter>''. Only the following values are supported: ''<allowed_values>''.'
    NoQueryParamProvided:
      value:
        code: '400-245'
        developerMessage: 'At least one of the following API specific query parameters is required: ''<query_parameter_list>''.'
    LimitExceeded:
      value:
        code: '400-10424'
        developerMessage: 'Limit exceeded. The allowed limit for ''{0}'' is ''{1}''.'
    # 401
    SessionHeaderMissing:
      value:
        code: 401-TBD
        developerMessage: TBD X-egain-session request header is missing.
    SessionInvalid:
      value:
        code: 401-TBD
        developerMessage: TBD Session is invalid or expired.
    Unauthorized:
      value:
        code: 401-101
        developerMessage: Invalid or expired 'Authorization' header provided. New login is required.
    InternalServerError:
      value:
        code: 500-100
        developerMessage: System is unable to process this request. Please contact your administrator.
    Forbidden:
      value:
        code: 403-178
        developerMessage: 'User is not allowed to perform the following action: <action_name>.'
    InvalidAcceptLanguage:
      value:
        code: 406-100
        developerMessage: Invalid 'Accept-Language' header value provided.
    NotFound:
      value:
        code: 404-100
        developerMessage: 'The following IDs supplied in the URI path were not found: ''<resource_id>''.'
    EmptyValue:

      value:
        code: 400-387
        developerMessage: 'The following attribute in request body cannot be empty: ''<attribute_name>''.'
    UnAllowedRequestBody:
      value:
        code: 400-203
        developerMessage: Request body is not allowed.
    Conflict:
      value:
        code: 409-100
        developerMessage: 'Last modified date provided in the request body for the following <resource> do not match: <resource_id>.'
    OrderWithoutSort:
      value:
        code: 400-124
        developerMessage: $order query parameter must be accompanied by $sort.
    RequestBodyNotProvided:
      value:
        code: 400-264
        developerMessage: Request body is mandatory. Please provide body for the request.
    MixingPageAndRangeQueryParameter:
      value:
        code: 400-120
        developerMessage: 'Unsupported combination of query parameters: pagination and range query parameters cannot be mixed in the same request.'
    NotFoundRequestBody:
      value:
        code: 400-194
        developerMessage: 'The following IDs supplied in the request body were not found: ''<resource_id>''.'
    RequiredAttributeMissingRequestBody:
      value:
        code: 400-146
        developerMessage: 'Required attribute is missing in request body: ''<attribute_name>''.'
    UnsupportedAttributeInRequestBody:
      value:
        code: 400-147
        developerMessage: 'Unsupported attribute is present in request body: ''<attribute_name>''.'
    TargetCustomerRequestBodyNotExist:
      value:
        code: 400-127
        developerMessage: 'Target customer sent in the request body does not exist: <customer_id>.'
    SameCustomerSourceAndTarget:
      value:
        code: 400-126
        developerMessage: Target customer in the request body and original customer of the case are same.
    Activity_Locked_By_Other_Users:
      value:
        code: 400-177
        developerMessage: 'The following activities are locked by other users: ''<user_ids>''.'
    Resource_Not_In_Open_State:
      value:
        code: 400-253
        developerMessage: 'This operation cannot be performed on the following <resource> as they are not in open status: <resource_id>.'
