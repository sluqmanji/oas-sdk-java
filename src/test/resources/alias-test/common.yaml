openapi: 3.0.0
servers:
  - url: https://api-na.egain.cloud/
  - url: https://ecosystem.egain.cloud/
info:
  version: 3.0.0
  title: Common Paths, Parametres, Request/Response Schemas, Examples used across all Hubs
paths:
  /:
    get:
      responses:
        '200':
          description: Place Holder
      operationId: placeholder
components:
  securitySchemes:
    oAuthUser:
      type: oauth2
      description: Authenticate as a user (agent) using code flow with PKCE.
      flows:
        authorizationCode:
          authorizationUrl: https://${LOGIN_DOMAIN}/${GATEWAY_ID}/${USER_SIGNIN_POLICY_NAME}/oauth2/v2.0/authorize
          tokenUrl: https://${LOGIN_DOMAIN}/${GATEWAY_ID}/${USER_SIGNIN_POLICY_NAME}/oauth2/v2.0/token
          scopes:
            '${SCOPE_PREFIX}analytics.resourcemgr.api': Allows full access to the eGain Analytics Resource Manager APIs.
    oAuthCustomer:
      type: oauth2
      description: Authenticate as a customer using code flow with PKCE.
      flows:
        authorizationCode:
          authorizationUrl: https://${LOGIN_DOMAIN}/${GATEWAY_ID}/${CUSTOMER_SIGNIN_POLICY_NAME}/oauth2/v2.0/authorize
          tokenUrl: https://${LOGIN_DOMAIN}/${GATEWAY_ID}/${CUSTOMER_SIGNIN_POLICY_NAME}/oauth2/v2.0/token
          scopes:
            '${SCOPE_PREFIX}analytics.resourcemgr.api': Allows full access to the eGain Analytics Resource Manager APIs.
    oAuthAnonymousCustomer:
      type: oauth2
      description: Authenticate as an anonymous customer.
      flows:
        clientCredentials:
          tokenUrl: https://${LOGIN_DOMAIN}/internal/oauth2/v2.0/anonymous/token?user_type=customer
          scopes:
            '${SCOPE_PREFIX}analytics.resourcemgr.api': Allows full access to the eGain Analytics Resource Manager APIs.
    oAuthClient:
      type: oauth2
      description: Authenticate as a client (Server to Server).
      flows:
        clientCredentials:
          tokenUrl: https://${LOGIN_DOMAIN}/global/${GATEWAY_ID}/oauth2/v2.0/token
          scopes:
            '${SCOPE_PREFIX}.default': Default scope
    bearerAuth:            # arbitrary name for the security scheme
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    mandatoryLanguageQueryParameter:
      name: $lang
      in: query
      description: The language used for fetching the details of a resource. Resources available in different languages may differ from each other.
      required: true
      schema:
        type: string
        enum:
          - en-US
          - fr-FR
          - en-GB
          - es-ES
          - it-IT
          - nl-NL
          - da-DA
          - sv-SE
          - pt-PT
          - fi-FI
          - no-NB
          - no-NN
          - ja-JA
          - de-DE
          - pt-BR
          - zh-CN
          - zh-TW
          - ko-KO
          - ru-RU
          - el-EL
          - tr-TR
          - pl-PL
          - cs-CS
          - sk-SK
          - hu-HU
          - sr-SR
          - ar-SA
          - hr-HR
          - ro-RO
          - th-TH
        example: en-US
    acceptLanguage:
      name: Accept-Language
      in: header
      description: The Language locale accepted by the client (used for locale specific fields
        in resource representation and in error responses).
      required: true
      schema:
        type: string
        enum:
          - en-US
          - es-ES
          - fr-FR
          - it-IT
          - de-DE
          - nl-NL
          - pt-BR
          - pt-PT
          - da-DK
          - ru-RU
          - fr-CA
          - zh-CN
          - ja-JP
          - ko-KR
          - sv-SE
        example: en-US
    xEgainIdpSession:
      name: x-egain-idp-session-id
      in: header
      description: Session ID obtained from eGain Idp.
      required: true
      schema:
        type: string
        maxLength: 36
        pattern: \b[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}\b
        example: 3155180e-0c13-43e9-9c38-e9045bcbf176
    xEgainSession:
      name: X-egain-session
      in: header
      description: Session ID obtained from Login API response header.
      required: true
      schema:
        type: string
        maxLength: 36
    xEgainTenantId:
      name: X-egain-tenant-id
      in: header
      description: The unique numeric identifier for a tenant, used in self-service functionality as well as third-party integrations.<br>*Note that if x-egain-activity-id is not provided, then this must be passed along with x-interaction-id.*
      required: true
      schema:
        type: string
        maxLength: 256
        pattern: ^[0-9]{0,256}$
        example: "228920"
    xEgainTenantIdOptional:
      name: X-egain-tenant-id
      in: header
      description: The unique numeric identifier for a tenant, used in self-service functionality as well as third-party integrations.<br>*Note that if x-egain-activity-id is not provided, then this must be passed along with x-interaction-id.*
      required: false
      schema:
        type: string   
        maxLength: 256 
        pattern: ^[0-9]{0,256}$
        example: "228920"
    xExtIntegrationId:
      name: x-ext-integration-id
      in: header
      description: "The unique numeric identifier for a tenant, used in self-service functionality as well as third-party integrations.<br><br>*Note: The x-ext-integration-id and x-ext-interaction-id headers must always be provided together and cannot be supplied independently.<br><br>The x-egain-activity-id may be provided on its own, or it may be provided along with both x-ext-integration-id and x-ext-interaction-id.*"
      required: false
      schema:
        type: string   
        maxLength: 40
        pattern: ^[\w\W]+$
      examples: 
        uuid: 
          value: "3155180e-0c13-43e9-9c38-e9045bcbf176"
        hex:
          value: "00Dbn00000IxGnx"
    xEgainSessionOptional:
      name: X-egain-session
      in: header
      description: The Session ID obtained from the Login API response header.
      required: false
      schema:
        type: string
    xEgainActivityId:
      name: x-egain-activity-id
      in: header
      description: A unique numeric interaction identifier from eGain.
      required: false
      schema:
        type: string
        minLength: 4
        maxLength: 9
        pattern: ^[0-9]{4,9}$
      example: "59237"
    XInteractionId:
      name: X-interaction-id
      in: header
      description: A unique interaction identifier from other CRM applications.<br>*Note that if x-egain-activity-id is not provided, then this must be passed along with x-egain-tenant-id.*
      required: false
      schema:
        type: string
        maxLength: 256
        pattern: ^[\w\W]+$
        example: test-test23-test4
    xExtInteractionId:
      name: x-ext-interaction-id
      in: header
      description: "A unique interaction identifier from other CRM applications.<br><br>*Note: The x-ext-integration-id and x-ext-interaction-id headers must always be provided together and cannot be supplied independently.<br><br>The x-egain-activity-id may be provided on its own, or it may be provided along with both x-ext-integration-id and x-ext-interaction-id.*"
      required: false
      schema:
        type: string
        maxLength: 40
        pattern: ^[\w\W]+$
      examples: 
        uuid: 
          value: "3155180e-0c13-43e9-9c38-e9045bcbf176"
        hex:
          value: "00Dbn00000IxGnx"
        # Can't include '%' symbol surrounding 'InteractionId' example due to the following rules:
        # https://stackoverflow.com/questions/68022396/how-to-escape-the-percent-sign-in-url-in-openapi

    authorization:
      name: Authorization
      in: header
      description: Access token for the client. The value must be "Bearer" followed by access token and must be provided if actor is client application.
      required: true
      schema:
        type: string
    authorizationOptional:
      name: Authorization
      in: header
      description: Access token for the client. The value must be "Bearer" followed by access token and must be provided if actor is client application.
      required: false
      schema:
        type: string
    forceLogin:
      name: forceLogin
      in: query
      description: Terminate the oldest created session of this user and create a mew session.
      required: false
      schema:
        type: string
        enum:
          - 'yes'
    attributeCommon:
      name: "$attribute"
      in: path
      description: Common query attributes list.
      required: true
      style: simple
      explode: false
      schema:
        type: string
      examples:
        All:
          value: "all"
        Individual Attributes:
          value: "$pagenum, $pagesize, $rangestart, $rangesize, $sort, $order, $lang, $level, $count"
    attributeArticleWithAllValue:
      name: "$attribute"
      in: query
      description: Common query parameter $attribute.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: "id, lastModified, created, suggestionState, folder, lock, language, department, macro, articleType, description, keywords, summary, additionInfo, content, label, imageUrl, translationStatus, relatedQuestions, notes, linkAlias, attachments, name, versionNumber, articleState, availabilityDate, expirationDate, custom.<name>, all"
    attributeArticle:
      name: "$attribute"
      in: query
      description: Common query parameter $attribute.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: "id, lastModified, created, suggestionState, folder, lock, language, department, macro, articleType, description, keywords, summary, additionInfo, content, label, imageUrl, translationStatus, relatedQuestions, notes, linkAlias, attachments, name, versionNumber, articleState, availabilityDate, expirationDate, custom.<name>"
    sort:
      name: "$sort"
      in: query
      description: Common query parameter $sort.
      required: false
      schema:
        type: string
    sortIdName:
      name: "$sort"
      in: query
      description: Objects returned in server response are sorted based on the attribute supplied under $sort.
      required: false
      schema:
        type: string
        enum:
          - id
          - name
        example: id
    sortIdNameDepartment:
      name: "$sort"
      in: query
      description: 'Objects returned in server response are sorted based on the attribute supplied under $sort. <br>_Default value_: name.'
      required: false
      schema:
        type: string
        enum:
          - id
          - name
          - departmentName
    order:
      name: "$order"
      in: query
      description: 'Common query parameter $order.<br>_Default value_: asc'
      required: false
      style: form
      explode: true
      schema:
        type: string
        enum:
          - asc
          - desc
        example: asc
    pagenum:
      name: "$pagenum"
      in: query
      description: 'Pagination parameter that specifies the page number of results to be returned. This is used in conjunction with $pagesize.<br>_Default value_: 1'
      required: false
      schema:
        type: string
        example: '1'
    pagesize:
      name: "$pagesize"
      in: query
      description: 'Pagination parameter that specifies the number of results per page. This is used in conjunction with $pagenum.<br>_Default value_: 25'
      required: false
      schema:
        type: string      
        example: '25'  
    rangestart:
      name: "$rangestart"
      in: query
      description: 'Range parameter that specifies the starting index of the range of results to be returned. This is used in conjunction with $rangesize.<br>_Default value_: 1'
      required: false
      schema:
        type: string
    rangesize:
      name: "$rangesize"
      in: query
      description: 'Range parameter that specifies the number (range) of results to be returned. This is used in conjunction with $rangestart.<br>_Default value_: 25'
      required: false
      schema:
        type: string
    ids:
      name: "ids"
      in: path
      description: Pass one ID or comma sperated list of ID(s).
      required: true
      style: simple
      explode: false
      schema:
        type: string
        maxLength: 20000
      examples:
        Single Id:
          value: '1001'
          description: Providing single ID.
        Multiple Ids:
          value: '1001,1002'
          description: Providing multiple IDs.
    id:
      name: id
      in: path
      description: The ID of the object.
      required: true
      style: simple
      explode: false
      schema:
        type: string
        pattern: ^[\w\W]+$
        minLength: 1
        maxLength: 255
      example: '1001' 
    accept:
      name: Accept
      in: header
      description: The content type accepted by the client.
      required: true
      schema:
        type: string
        default: application/json
        enum:
          - application/json
    contentType:
      name: Content-Type
      in: header
      description: The media type sent by the client.
      required: true
      schema:
        type: string
        default: application/json
        enum:
          - application/json        
  responses:
    Success:
      description: Success
    Created:
      description: When created successfully
    NoContent:
      description: No content
    NoContentSearchWithPagination:
      description: |
        NO Content
        * No matches were found for given search criteria.
        * Matches found for this search, however the requested page or range doesn't contain any results.
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Not found:
              $ref: "#/components/examples/NotFound"
    OK:
      description: Fetched successfully
    Accepted:
      description: Message accepted for processing
    MethodNotAllowed:
      description: Method is not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
    PreConditionFailed:
      description: PreCondition failed
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Conflict:
              $ref: "#/components/examples/Conflict"
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Unsupported Parameters:
              $ref: "#/components/examples/UnsupportedParameters"
            Invalid Value:
              $ref: "#/components/examples/InvalidValue"
            Missing required query parameter:
              $ref: "#/components/examples/MissingParameter"
    BadImportContentRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            LimitExceeded Value:
              $ref: "#/components/examples/LimitExceeded"          
            Invalid Value:
              $ref: "#/components/examples/InvalidValue"
    BadRequestUnSupportedQueryParameters:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Unsupported parameters:
              $ref: "#/components/examples/UnsupportedParameters"
    BadRequestUnSupportedQueryParameterAnd$attributeValue:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Unsupported parameters:
              $ref: "#/components/examples/UnsupportedParameters"
            Invalid value of common parameter:
              $ref: "#/components/examples/InvalidValueForAttribute"
    BadRequestForRequestBodyWithoutQueryParam:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Unsupported parameters:
              $ref: "#/components/examples/UnsupportedParameters"
            Invalid value:
              $ref: "#/components/examples/InvalidValue"
            Required attribute not provided:
              $ref: "#/components/examples/RequiredAttributeMissingRequestBody"
            Request body not provided:
              $ref: "#/components/examples/RequestBodyNotProvided"
    BadRequestForRequestBodyWithQueryParam:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Unsupported parameters:
              $ref: "#/components/examples/UnsupportedParameters"
            Invalid query parameter value:
              $ref: "#/components/examples/InvalidValueQueryParameter"
            Invalid attribute value:
              $ref: "#/components/examples/InvalidValue"
            Required attribute not provided:
              $ref: "#/components/examples/RequiredAttributeMissingRequestBody"
            Request body not provided:
              $ref: "#/components/examples/RequestBodyNotProvided"
    BadRequestForRequestBodyWithMacrosAndQueryParam:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Unsupported parameters:
              $ref: "#/components/examples/UnsupportedParameters"
            Invalid query parameter value:
              $ref: "#/components/examples/InvalidValueQueryParameter"
            Invalid attribute value:
              $ref: "#/components/examples/InvalidValue"
            Required attribute not provided:
              $ref: "#/components/examples/RequiredAttributeMissingRequestBody"
            Request body not provided:
              $ref: "#/components/examples/RequestBodyNotProvided"
            Invalid macro provided:
              $ref: "#/components/examples/InvalidValueMacro"
            Empty macro provided:
              $ref: "#/components/examples/EmptyMacro"
            Macro expansion failed:
              $ref: "#/components/examples/MacroExpansionFailed"
    BadRequestSearchWithPagination:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Unsupported query parameters:
              $ref: "#/components/examples/UnsupportedParameters"
            Invalid query parameter value:
              $ref: "#/components/examples/InvalidQueryParamValue"
            None of the API specific query parameter provided:
              $ref: "#/components/examples/NoQueryParamProvided"
            Unsupported combination of common query parameters:
              $ref: "#/components/examples/UnallowedCombination"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Unauthorized:
              $ref: "#/components/examples/Unauthorized"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Internal Server Error:
              $ref: "#/components/examples/InternalServerError"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Forbidden:
              $ref: "#/components/examples/Forbidden"
    NotAcceptable:
      description: Not Acceptable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
          examples:
            Invalid Accept-Language:
              $ref: "#/components/examples/InvalidAcceptLanguage"
    # Error response definitions
    WSErrorCommon:
      description: Error message
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WSErrorCommon"
    ErrorCommon:
      description: Error message
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ErrorKnowledge:
      description: Error message
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorKnowledge"
  schemas:
    BaseAccessToken:
      type: object
      properties:
        grant_type:
          type: string
          example: client_credentials
          required:
            - grant_type
    Login:
      type: object
      properties:
        userName:
          type: string
        password:
          type: string
    AccessTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: Access token value
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJhdWQiOiJ
        accessTokenType:
          type: string
          description: Type of token
          enum: ['Bearer']
          example: Bearer
        expireAt:
          type: string
          description: Expire Date is (in GMT)
          example: "2019-07-14 12:02:15.843"
    ClientApplication:
      type: object
      required:
        - name
        - type
        - roles
      properties:
        id:
          description: The UUID generated for the client application
          type: string
          pattern: \b[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}\b
          minLength: 36
          maxLength: 36
          example: c987d07a-d59c-11ea-87d0-0242ac130000
        versionId:
          type: integer
          description: Version Id of object
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Name for client application
        description:
          type: string
          minLength: 1
          maxLength: 1023
        status:
          type: string
          default: active
          enum: [ 'active','inactive']
        created:
          type: string
          format: date-time
          description: When authentication type was created (in GMT)
          example: '2020-08-11 03:19:21.070'
        isCurrent:
          type: boolean
        roles:
          type: array
          minItems: 1
          maxItems: 7
          items:
            $ref: "#/components/schemas/Role"
        oauth:
          type: object
          description: OAuth client generated for on Messaging Hub side for this client application. Client application needs to use this to generate accessToken required for sending message.
          properties:
            clientId:
              type: string
              description: oauth clientId
            clientSecret:
              type: string
              description: oauth clientId
            accessTokenExpiryHours:
              type: integer
              default: 24
              description: Access Token generated using this oauth client will expire after these many hours
              example: 24
    Role:
      type: object
      required:
        - name
        - version
        - callback
        - notificationEmail
        - authentication
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          uniqueItems: true
          description: role participant will be playing. Use this name as value of 'scope' attribute while generating access token.
          enum: ['custom_bot', 'customer','egain_agent', 'decorator', 'recorder', 'custom_agent' ]
        version:
          type: string
          description: Messaging Hub sends version specific payload. Information based on version of Messaging Hub payload your client application supports.
          enum: ['v1']
          example: v1
        callback:
          type: string
          minLength: 1
          maxLength: 1023
          description: Callback API to client application to recieve messages from various participants
          example: https://example.support.com/messaging/callback/customer
        notificationEmail:
          type: string
          minLength: 1
          maxLength: 255
          description: If client application callback is not reachable, Messaging Hub sends a notification to this email address.
          example: example@example.com
        authentication:
          type: object
          properties:
            id:
              type: string
              description: The UUID generated for the client application
              pattern: \b[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}\b
              minLength: 36
              maxLength: 36
              example: a987d07a-d59c-11ea-87d0-0242ac130001
    OauthClient:
      type: object
      properties:
        scope:
          type: string
          description: Include value for scope if you are generating token for sending message.
          enum: ['custom_bot', 'customer','egain_agent', 'decorator', 'recorder', 'custom_agent' ]
        clientId:
          type: string
          description: oauth clientId
        clientSecret:
          type: string
          description: oauth client secret
    EmailAddresses:
      type: "object"
      title: "EmailAddresses"
      properties:
        emailAddress:
          title: "emailAddress"
          type: "array"
          items:
            type: "string"
          minItems: 0
    L10NString:
      type: "object"
      title: "L10NString"
      properties:
        value:
          title: "value"
          description: "A string that indicates the value."
          type: "string"
          minLength: 0
          maxLength: 255
          pattern: ^[\w\W]*$
        displayValue:
          title: "displayValue"
          description: "Localized string of the value element."
          type: "string"
          minLength: 0
          maxLength: 255
          pattern: ^[\w\W]*$

    L10NStringCustomAttributeForCreateUpdate:
      type: "object"
      title: "L10NString"
      properties:
        value:
          title: "value"
          description: "A string that indicates the value."
          type: "string"
          pattern: ^[\w\W]+$
          minLength: 1
          maxLength: 4000

    L10NStringCustomAttribute:
      type: "object"
      title: "L10NString"
      properties:
        value:
          title: "value"
          description: "A string that indicates the value."
          type: "string"
          pattern: ^[\x20-\x7E\u0080-\uFFFF?=&#@!$'()*+,;:._~-]*$
          minLength: 1
          maxLength: 4000
        displayValue:
          title: "displayValue"
          description: "The localized string of the value element."
          type: "string"
          pattern: ^[\w\W]+$
          minLength: 1
          maxLength: 4000
    L10NStringTitle:
      type: "object"
      title: "L10NString"
      properties:
        value:
          title: "value"
          description: "A string that indicates the value."
          type: "string"
          enum:
            - "Mr."
            - "Mrs."
            - "Ms."
            - "Miss"
        displayValue:
          title: "displayValue"
          description: "Localized string of the value element."
          type: "string"
    String0To255:
      type: "object"
      title: "String0To255"
      properties:
        value:
          title: "value"
          type: "string"
    Attributes:
