          minimum: 1
          maximum: 30
          default: 20
        link:
          title: "link"
          description: "Can include the *prev* and *next* link."
          type: "array"
          items:
            $ref: "#/components/schemas/Link"
          maxItems: 2
          minItems: 0
    
    String1To255:
      type: "object"
      title: "String1To255"
      properties:
        value:
          title: "value"
          type: "string"
  
    Images:
      type: "object"
      title: "Images"
      properties:
        image:
          title: "image"
          type: "array"
          items:
