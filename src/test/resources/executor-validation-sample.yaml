openapi: 3.0.0
info:
  title: Executor validation sample
  version: 1.0.0
paths:
  /folders:
    post:
      operationId: createFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFolderPayload'
      responses:
        '201':
          description: Created
      x-oas-sdk-executor:
        imports:
          - com.example.auth.FolderAuthorizer
        methods:
          createAuthorizer: |
            return FolderAuthorizer.allowAll(callerContext);
          executeBusinessOperationImpl: |
            mLogger.log(Level.INFO, callerContext, logSource, "stub");
components:
  schemas:
    FolderBase:
      type: object
      properties:
        name:
          type: string
        created:
          readOnly: true
        articles:
          readOnly: true
    CreateFolderPayload:
      allOf:
        - type: object
          required:
            - name
          properties:
            id:
              type: string
              readOnly: true
            lastModified:
              readOnly: true
            path:
              readOnly: true
          oneOf:
            - type: object
              required: [department]
              properties:
                department:
                  type: object
                  properties:
                    id:
                      type: string
                parent:
                  type: string
                  readOnly: true
            - type: object
              required: [parent]
              properties:
                parent:
                  type: object
                  properties:
                    id:
                      type: string
                department:
                  type: string
                  readOnly: true
        - $ref: '#/components/schemas/FolderBase'
